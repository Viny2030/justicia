name: Actualizacion Datos Judiciales

on:
  schedule:
    - cron: "0 3 * * 1-5"
  workflow_dispatch:
    inputs:
      solo_pjn:
        description: "Solo scraper_pjn_completo (true/false)"
        required: false
        default: "false"
      solo_jus:
        description: "Solo scraper_datos_jus_completo (true/false)"
        required: false
        default: "false"
      year_pjn:
        description: "Filtrar PJN por ano (ej: 2024)"
        required: false
        default: ""

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install requests pandas openpyxl xlrd beautifulsoup4 lxml pdfplumber tqdm

      - name: "1-4 scraper_magistrados.py"
        if: ${{ github.event.inputs.solo_pjn != 'true' && github.event.inputs.solo_jus != 'true' }}
        run: python scraper_magistrados.py || echo "scraper_magistrados error, continuando"

      - name: "2-4 scraper_estadisticas.py"
        if: ${{ github.event.inputs.solo_pjn != 'true' && github.event.inputs.solo_jus != 'true' }}
        run: python scraper_estadisticas.py || echo "scraper_estadisticas error, continuando"

      - name: "3-4 scraper_datos_jus_completo.py"
        if: ${{ github.event.inputs.solo_pjn != 'true' }}
        run: python scraper_datos_jus_completo.py || echo "datos_jus error, continuando"

      - name: "4-4 scraper_pjn_completo.py"
        if: ${{ github.event.inputs.solo_jus != 'true' }}
        run: |
          YEAR="${{ github.event.inputs.year_pjn }}"
          if [ -n "$YEAR" ]; then
            python scraper_pjn_completo.py --desde "$YEAR" || echo "pjn error, continuando"
          else
            python scraper_pjn_completo.py || echo "pjn error, continuando"
          fi

      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.json *.csv datos_jus/ pjn_estadisticas/ || true
          if git diff --cached --quiet; then
            echo "Sin cambios, no se hace commit."
          else
            git commit -m "data: actualizacion automatica $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "Push exitoso"
          fi

      - name: Resumen archivos generados
        if: always()
        run: |
          echo "=== JSONs ===" && find . -maxdepth 3 -name "*.json" ! -path "./.git/*" | head -20
          echo "=== CSVs ===" && find . -maxdepth 3 -name "*.csv" ! -path "./.git/*" | head -20